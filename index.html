<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haerang Maya - Tarjeta VIP</title>
  <style>
    :root {
      --rosa-cerezo: #e6739f;
      --verde-quetzal: #228b22;
      --azul-hanbok: #2b3467;
      --fondo-crema: #fff9f2;
      --marron-texto: #4a3b32;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--fondo-crema);
      color: var(--marron-texto);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .card {
      background-color: #ffffff;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(74, 59, 50, 0.08);
      max-width: 400px;
      width: 100%;
      padding: 20px;
      border: 2px solid #cfdee2;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .logo-title {
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--azul-hanbok);
    }

    .vip-tag {
      background-color: var(--rosa-cerezo);
      color: white;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: bold;
    }

    .stamps-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 20px 0;
    }

    .stamp {
      aspect-ratio: 1;
      border: 2px dashed #ffcad4;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #888;
      font-size: 0.9rem;
      background-color: #fff;
      text-align: center;
    }

    .stamp.active {
      border: 2px solid var(--verde-quetzal);
      background-color: #e8f5e9;
      color: var(--verde-quetzal);
      font-size: 1.3rem;
    }

    .stamp.reward {
      border: 2px dashed var(--rosa-cerezo);
      color: var(--rosa-cerezo);
      font-weight: bold;
    }

    .input-group {
      margin-top: 15px;
      display: flex;
      gap: 8px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px;
      border: 2px solid #ccc;
      border-radius: 8px;
      font-size: 0.9rem;
      text-transform: uppercase;
    }

    button {
      background-color: var(--azul-hanbok);
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .msg {
      margin-top: 10px;
      font-size: 0.85rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
      <span class="logo-title">Haerang Maya</span>
      <span class="vip-tag">Tarjeta VIP</span>
    </div>

    <p style="text-align: center; font-size: 0.9rem;">¡Primer sello GRATIS de bienvenida! Completa la tarjeta en compras mayores a Q35 y reclama tu regalo.</p>

    <div class="stamps-grid" id="stampsGrid">
      <div class="stamp">GRATIS</div>
      <div class="stamp">2</div>
      <div class="stamp">3</div>
      <div class="stamp">4</div>
      <div class="stamp">5</div>
      <div class="stamp">6</div>
      <div class="stamp">7</div>
      <div class="stamp">8</div>
      <div class="stamp reward">REGALO 🎁</div>
    </div>

    <div class="input-group">
      <input type="text" id="codeInput" placeholder="Ej: HM-83921048">
      <button onclick="addStamp()">Canjear</button>
    </div>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    const SECRET_KEY = 7439;
    // Inicia con 1 sello gratis por defecto
    let currentStamps = parseInt(localStorage.getItem('hm_stamps') || '1');

    function updateGrid() {
      const stamps = document.querySelectorAll('.stamp');
      stamps.forEach((stamp, index) => {
        if (index < currentStamps) {
          stamp.classList.add('active');
          stamp.innerText = '🌸';
        } else {
          stamp.classList.remove('active');
          if (index === 0) {
            stamp.innerText = 'GRATIS';
          } else if (index === 8) {
            stamp.innerText = 'REGALO 🎁';
          } else {
            stamp.innerText = index + 1;
          }
        }
      });
    }

    function addStamp() {
      const input = document.getElementById('codeInput').value.trim().toUpperCase();
      const msg = document.getElementById('msg');

      if (!input.startsWith('HM-') || input.length !== 11) {
        msg.style.color = 'red';
        msg.innerText = 'Código inválido.';
        return;
      }

      const rawCode = input.replace('HM-', '');
      const randomSeed = parseInt(rawCode.substring(0, 4));
      const expectedHash = parseInt(rawCode.substring(4));

      const calculatedHash = (randomSeed * SECRET_KEY) % 9000 + 1000;

      if (expectedHash === calculatedHash) {
        if (currentStamps < 9) {
          currentStamps++;
          localStorage.setItem('hm_stamps', currentStamps);
          updateGrid();
          msg.style.color = 'green';
          if (currentStamps === 9) {
            msg.innerText = '🎉 ¡Felicidades! Has completado tu tarjeta VIP. Reclama tu regalo.';
          } else {
            msg.innerText = '¡Sello agregado con éxito!';
          }
          document.getElementById('codeInput').value = '';
        } else {
          msg.style.color = 'orange';
          msg.innerText = '¡Ya reclamaste todos los sellos de esta tarjeta!';
        }
      } else {
        msg.style.color = 'red';
        msg.innerText = 'Código no válido o alterado.';
      }
    }

    updateGrid();
  </script>

</body>
</html>
